<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy - Premium E-Commerce</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <header class="navbar">
        <div class="logo">ShopEasy <span class="accent">🛒</span></div>
        <div class="search-container">
            <input type="text" id="search" placeholder="Search premium products..." onkeyup="searchProduct()">
        </div>
        <div class="nav-right">
            <button id="themeToggle" class="icon-btn" aria-label="Toggle Dark Mode">🌙</button>
            <button id="cartBtn" class="cart-btn" onclick="toggleCart()">
                🛍 Cart <span class="badge" id="count">0</span>
            </button>
        </div>
    </header>

    <!-- Categories -->
    <nav class="categories">
        <button class="active" onclick="filterCategory('all', this)">🌟 All</button>
        <button onclick="filterCategory('electronics', this)">💻 Electronics</button>
        <button onclick="filterCategory('fashion', this)">👕 Fashion</button>
        <button onclick="filterCategory('mobile', this)">📱 Mobiles</button>
        <button onclick="filterCategory('accessories', this)">🎒 Accessories</button>
    </nav>

    <!-- Banner -->
    <section class="banner">
        <div class="banner-content">
            <h1>Elevate Your Lifestyle ✨</h1>
            <p>Discover curations of top-tier products.</p>
        </div>
    </section>

    <!-- Sorting -->
    <div class="controls-bar">
        <span id="resultsCount">Showing all products</span>
        <select id="sortSelect" onchange="sortProducts()">
            <option value="default">Sort by Default</option>
            <option value="low-high">Price: Low to High</option>
            <option value="high-low">Price: High to Low</option>
        </select>
    </div>

    <!-- Products -->
    <main class="products" id="productList">
        <!-- Products generated by JS to keep it clean and allow sorting -->
    </main>

    <!-- Cart Drawer -->
    <div id="cartDrawer" class="cart-drawer">
        <div class="cart-header">
            <h2>Your Cart 🛍</h2>
            <button onclick="toggleCart()" class="close-btn">✖</button>
        </div>
        <div class="cart-body">
            <ul id="cartList">
                <div class="empty-cart-msg">Your cart is feeling lonely. Add some products!</div>
            </ul>
        </div>
        <div class="cart-footer">
            <div class="cart-total">Total: ₹<span id="total">0</span></div>
            <button class="checkout-btn" onclick="openCheckout()">Proceed to Checkout</button>
        </div>
    </div>
    <div id="cartOverlay" class="cart-overlay" onclick="toggleCart()"></div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeModal('productModal')">✖</button>
            <div class="modal-body" id="modalBody">
                <!-- Content injected via JS -->
            </div>
        </div>
    </div>

    <!-- Checkout Modal -->
    <div id="checkoutModal" class="modal">
        <div class="modal-content checkout-content">
            <button class="close-btn" onclick="closeModal('checkoutModal')">✖</button>
            <h2>Secure Checkout 🔒</h2>
            <form id="checkoutForm" onsubmit="processCheckout(event)">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" required placeholder="John Doe">
                </div>
                <div class="input-group">
                    <label>Card Number</label>
                    <input type="text" required pattern="\d{16}" placeholder="1234 5678 1234 5678" maxlength="16" title="Please enter a 16 digit card number without spaces">
                </div>
                <button type="submit" class="pay-btn">Pay ₹<span id="checkoutTotal">0</span></button>
            </form>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <script src="script.js"></script>
</body>
</html>
